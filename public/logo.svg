<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#18A058;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#36AD6A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#E8F5E9;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" rx="115" fill="url(#bgGradient)"/>
  
  <!-- Image Frame -->
  <rect x="106" y="106" width="300" height="300" rx="24" fill="none" stroke="url(#iconGradient)" stroke-width="20"/>
  
  <!-- Mountain/Sun -->
  <circle cx="256" cy="200" r="40" fill="url(#iconGradient)" opacity="0.9"/>
  
  <!-- Mountains -->
  <path d="M126 380 L196 260 L256 320 L316 260 L386 380 Z" fill="url(#iconGradient)" opacity="0.85"/>
  
  <!-- Bottom Accent -->
  <path d="M156 380 Q256 360 356 380" stroke="url(#iconGradient)" stroke-width="12" fill="none" opacity="0.6" stroke-linecap="round"/>
  
  <!-- Sparkles -->
  <circle cx="356" cy="140" r="8" fill="url(#iconGradient)" opacity="0.7"/>
  <circle cx="380" cy="170" r="5" fill="url(#iconGradient)" opacity="0.6"/>
  <circle cx="380" cy="200" r="6" fill="url(#iconGradient)" opacity="0.5"/>
</svg>
